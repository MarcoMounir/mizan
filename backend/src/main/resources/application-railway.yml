# application-railway.yml
# Handles: dynamic PORT, optional Redis/RabbitMQ, Railway's env var names

server:
  port: ${PORT:8080}   # Railway injects PORT dynamically — this is critical

spring:
  # PostgreSQL — Railway auto-injects these when you add PostgreSQL plugin
  datasource:
    url: jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:railway}
    username: ${PGUSER:railway}
    password: ${PGPASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true

  # Redis — only connects if REDISHOST is set (Railway injects it when you add Redis plugin)
  data:
    redis:
      host: ${REDISHOST:localhost}
      port: ${REDISPORT:6379}
      password: ${REDISPASSWORD:}
      timeout: 3000
      connect-timeout: 3000

  # DISABLE RabbitMQ completely — don't even try to connect
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

mizan:
  jwt:
    secret: ${JWT_SECRET:change_me_in_production_64_chars_minimum_random_string_here_1234567890abcdef}
    access-token-expiry: 900
    refresh-token-expiry: 2592000
    issuer: mizan-api

  auth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:not-configured}
    apple:
      client-id: ${APPLE_CLIENT_ID:not-configured}

  rate-limit:
    auth-requests-per-minute: 10
    api-requests-per-minute: 100

  market-data:
    cache-ttl-seconds: 180

logging:
  level:
    root: INFO
    com.mizan: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

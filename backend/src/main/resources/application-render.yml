# application-render.yml
# Profile for Render.com free tier deployment
# Activated by SPRING_PROFILES_ACTIVE=render

spring:
  # Neon PostgreSQL (free tier — connection pooled via SSL)
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}?sslmode=require
    username: ${DB_USER}
    password: ${DB_PASS}
    hikari:
      maximum-pool-size: 5     # Neon free tier limit
      minimum-idle: 1
      connection-timeout: 10000

  # Upstash Redis (free tier — requires SSL + password)
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: true

  # Disable RabbitMQ on free tier (audit writes synchronously)
  rabbitmq:
    listener:
      simple:
        auto-startup: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

  # Flyway — run migrations on startup
  flyway:
    enabled: true
    baseline-on-migrate: true

# App config — adjusted for free tier
mizan:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: 900
    refresh-token-expiry: 2592000
    issuer: mizan-api

  auth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:not-configured}
    apple:
      client-id: ${APPLE_CLIENT_ID:not-configured}

  rate-limit:
    auth-requests-per-minute: 10
    api-requests-per-minute: 60   # lower for free tier

  market-data:
    cache-ttl-seconds: 300  # 5 min cache on free tier (save API calls)

# Logging — JSON for Render log aggregation
logging:
  level:
    root: INFO
    com.mizan: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health

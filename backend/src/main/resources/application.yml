server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: mizan-api

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mizan}
    username: ${DB_USER:mizan}
    password: ${DB_PASS:mizan_dev_password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate  # Flyway handles migrations
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
    open-in-view: false

  # Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 5000

  # RabbitMQ
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:mizan}
    password: ${RABBITMQ_PASS:mizan_dev_password}

# Custom app config
mizan:
  jwt:
    secret: ${JWT_SECRET:CHANGE_ME_IN_PRODUCTION_minimum_64_characters_long_random_string_here_1234567890}
    access-token-expiry: 900        # 15 minutes (seconds)
    refresh-token-expiry: 2592000   # 30 days (seconds)
    issuer: mizan-api

  auth:
    google:
      client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
    apple:
      client-id: ${APPLE_CLIENT_ID:your-apple-client-id}
      team-id: ${APPLE_TEAM_ID:your-apple-team-id}
      key-id: ${APPLE_KEY_ID:your-apple-key-id}

  rate-limit:
    auth-requests-per-minute: 10
    api-requests-per-minute: 100

  market-data:
    twelve-data-api-key: ${TWELVE_DATA_API_KEY:}  # Get free key at https://twelvedata.com
    cache-ttl-seconds: 180  # 3 minutes — balances freshness vs API call conservation

# Logging
logging:
  level:
    root: INFO
    com.mizan: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
